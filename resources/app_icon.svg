<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="rgba(0,0,0,0.2)" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>
  <rect x="28" y="28" width="200" height="200" rx="30" fill="url(#grad1)" filter="url(#shadow)"/>
  <rect x="48" y="48" width="160" height="160" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  
  <!-- Modbus Connection Lines -->
  <line x1="78" y1="88" x2="178" y2="88" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="78" y1="128" x2="178" y2="128" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="78" y1="168" x2="178" y2="168" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Connection Dots -->
  <circle cx="78" cy="88" r="8" fill="white"/>
  <circle cx="178" cy="88" r="8" fill="white"/>
  <circle cx="78" cy="128" r="8" fill="white"/>
  <circle cx="178" cy="128" r="8" fill="white"/>
  <circle cx="78" cy="168" r="8" fill="white"/>
  <circle cx="178" cy="168" r="8" fill="white"/>
</svg>
