name: Build & Release

# 태그(v*) 푸시 시 Windows/Ubuntu 실행파일을 빌드해 GitHub Release 에 첨부한다.
# 일반 푸시/PR 에서는 테스트 + 빌드(아티팩트 업로드)까지만 수행한다.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # 릴리스 생성에 필요

jobs:
  test:
    name: Test (offscreen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxcb-cursor0 libxkbcommon0 libdbus-1-3
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pymodbus>=3.9.2,<3.10" "PySide6==6.9.1" "pytest>=8"
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pymodbus>=3.9.2,<3.10" "PySide6==6.9.1" "pyinstaller>=6.14.1"
      - name: Build executables
        run: python build.py all
      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp "dist/modbus_tcp_server${{ matrix.ext }}" "release/modbus_tcp_server-${{ matrix.platform }}-x64${{ matrix.ext }}"
          cp "dist/modbus_tcp_client${{ matrix.ext }}" "release/modbus_tcp_client-${{ matrix.platform }}-x64${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: true
